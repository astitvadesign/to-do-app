<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple To‑Do App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>To‑Do</h1>

      <form id="task-form" class="task-form" autocomplete="off">
        <input id="task-input" type="text" name="task" placeholder="Add a new task..." required />
        <button type="submit">Add</button>
      </form>

      <section class="tasks">
        <h2>Your tasks</h2>
        <ul id="task-list" class="task-list" aria-live="polite"></ul>
        <p id="empty-msg" class="empty">No tasks yet. Add one above.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
